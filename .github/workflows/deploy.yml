name: Deploy to PythonAnywhere

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PA_HOST }} # e.g., ssh.pythonanywhere.com
        username: ${{ secrets.PA_USERNAME }}
        key: ${{ secrets.PA_SSH_KEY }}
        script: |
          cd ~/UrlShortener
          git pull origin master
          source ~/myvenv/bin/activate
          pip install -r requirements.txt
          python manage.py migrate
          python manage.py collectstatic --noinput
          # Reload the webapp (specific to PythonAnywhere)
          touch /var/www/${{ secrets.PA_USERNAME }}_pythonanywhere_com_wsgi.py
