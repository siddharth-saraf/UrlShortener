{% extends 'urlShortener/base.html' %}

{% block title %}
    Password Reset Complete
{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 text-center">
        <div class="card border-0 shadow-lg rounded-4 p-5">
            <div class="card-body">
                <div class="bg-success-subtle d-inline-block p-4 rounded-circle text-success mb-4">
                    <i class="fas fa-check-circle fa-4x"></i>
                </div>
                <h1 class="fw-bold text-dark mb-3">Success!</h1>
                <p class="lead text-muted mb-5">
                    Your password has been reset successfully. You can now log in with your new credentials.
                </p>
                <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-5 py-3 shadow-sm fw-bold">
                    Log In Now
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
